name: Fetch Fitbit Weight

on:
  schedule:
    - cron: "0 8 * * *"   # daily at 8am UTC
  workflow_dispatch:        # allow manual trigger

permissions:
  contents: write

jobs:
  fetch-weight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch Fitbit weight data
        env:
          FITBIT_CLIENT_ID:     ${{ secrets.FITBIT_CLIENT_ID }}
          FITBIT_CLIENT_SECRET: ${{ secrets.FITBIT_CLIENT_SECRET }}
          FITBIT_REFRESH_TOKEN: ${{ secrets.FITBIT_REFRESH_TOKEN }}
        run: python fetch_fitbit.py

      - name: Rotate refresh token secret
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: gh secret set FITBIT_REFRESH_TOKEN --repo michael-tint/websteps --body "$(cat new_refresh_token.txt)"

      - name: Commit and push
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add weight_data.json
          git diff --staged --quiet || git commit -m "Sync Fitbit weight data [skip ci]"
          git push
