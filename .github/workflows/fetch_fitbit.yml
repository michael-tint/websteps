name: Update Fitbit Data

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch today's weight
        run: python fetch_fitbit.py

      - name: Commit and push
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add me.json
          git diff --staged --quiet || git commit -m "Sync Fitbit weight [skip ci]"
          git push
