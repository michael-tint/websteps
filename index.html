<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebSteps</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      padding: 0.75rem 1.5rem 0.5rem;
    }

    h1 { font-size: 1.25rem; font-weight: 700; color: #f8fafc; margin-bottom: 0.5rem; }

    .site-header { display: flex; justify-content: space-between; align-items: flex-start; }
    .header-actions { display: flex; align-items: center; gap: 0.5rem; padding-top: 0.3rem; }

    /* tabs */
    .tabs { display: flex; gap: 0.4rem; border-bottom: 1px solid #334155; margin-bottom: 0.6rem; flex-shrink: 0; }
    .tab { padding: 0.35rem 1rem; border-radius: 6px 6px 0 0; border: 1px solid transparent; border-bottom: none; cursor: pointer; font-size: 0.85rem; font-weight: 600; background: none; color: #64748b; }
    .tab:hover { color: #cbd5e1; }
    .tab.active { background: #1e293b; border-color: #334155; color: #f8fafc; margin-bottom: -1px; }

    /* panels */
    .panel { display: none; }

    /* dashboard + gym: fills remaining height, no page scroll */
    #panel-dashboard.active, #panel-gym.active {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
    }

    /* raw tabs: fill height and scroll */
    #panel-me.active, #panel-mom.active, #panel-weight.active {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
      overflow-y: auto;
    }

    /* weight table inputs */
    .w-input {
      background: #0f172a;
      color: #e2e8f0;
      border: 1px solid #334155;
      border-radius: 4px;
      padding: 0.18rem 0.4rem;
      font-size: 0.8rem;
      width: 6ch;
      text-align: right;
    }
    .w-input.w-weight { width: 7ch; }
    .w-input.w-comp   { width: 8ch; }
    .w-input.gym-input {
      width: 100%;
      text-align: left;
    }
    .w-input:focus {
      outline: none;
      border-color: #60a5fa;
    }
    /* weight table column widths */
    #weight-tbody td, #panel-weight table th { white-space: nowrap; text-align: left; }
    #panel-weight table th:nth-child(1) { width: 7rem; }
    #panel-weight table th:nth-child(2),
    #panel-weight table th:nth-child(3),
    #panel-weight table th:nth-child(4) { width: 10rem; }
    #panel-weight table th:nth-child(5) { width: 22ch; min-width: 15ch; }
    #panel-weight table th:nth-child(6) { width: 6rem; }
    #panel-weight table th:nth-child(7) { width: 1rem; }

    /* raw tab controls */
    .controls { display: flex; gap: 0.6rem; align-items: center; flex-wrap: wrap; margin-bottom: 0.75rem; flex-shrink: 0; }
    .controls label { font-size: 0.82rem; color: #94a3b8; }
    input[type=date] { background: #1e293b; color: #e2e8f0; border: 1px solid #475569; border-radius: 6px; padding: 0.28rem 0.55rem; font-size: 0.82rem; }

    .save-btn { background: #1e293b; color: #94a3b8; border: 1px solid #334155; border-radius: 6px; padding: 0.28rem 0.8rem; font-size: 0.82rem; cursor: pointer; }
    .save-btn:hover { color: #f8fafc; border-color: #475569; }
    .del-btn { background: none; border: none; color: #475569; font-size: 0.78rem; cursor: pointer; padding: 0 0.3rem; line-height: 1; }
    .del-btn:hover { color: #f87171; }

    /* summary cards */
    .summary { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 0.6rem; margin-bottom: 0.6rem; flex-shrink: 0; }
    .card { background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 0.55rem 0.8rem; }
    .card-label { font-size: 0.7rem; color: #64748b; margin-bottom: 0.2rem; text-transform: uppercase; letter-spacing: 0.04em; }
    .card-value { font-size: 1.15rem; font-weight: 700; color: #f8fafc; }
    .card-value.blue  { color: #60a5fa; }
    .card-value.pink  { color: #f472b6; }
    .card-value.green { color: #4ade80; }
    .card-value.red   { color: #f87171; }

    /* dashboard main row */
    .dash-main { display: flex; gap: 1rem; flex: 1; min-height: 0; }

    /* pivot table LEFT */
    .dash-table-wrap {
      flex: 0 0 300px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 10px;
      overflow-y: auto;
      height: 100%;
    }

    /* chart RIGHT */
    .chart-wrap {
      flex: 1;
      min-width: 0;
      min-height: 0;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 0.9rem 1rem 0.6rem;
      display: flex;
      flex-direction: column;
      position: relative;
    }
    .chart-title { font-size: 0.75rem; font-weight: 600; color: #64748b; margin-bottom: 0.4rem; text-align: center; flex-shrink: 0; }
    .chart-wrap canvas { flex: 1; min-height: 0; }

    /* shared table */
    .table-wrap { background: #1e293b; border: 1px solid #334155; border-radius: 10px; overflow: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
    th { background: #0c1526; padding: 0.5rem 0.8rem; text-align: right; color: #64748b; font-weight: 600; position: sticky; top: 0; z-index: 1; white-space: nowrap; }
    th:first-child { text-align: left; }
    td { padding: 0.35rem 0.8rem; text-align: right; border-top: 1px solid #0c1526; white-space: nowrap; }
    td:first-child { text-align: left; }

    /* pivot row levels */
    #panel-gym table { font-size: 0.72rem; }
    #panel-gym th { padding: 0.35rem 0.4rem; text-align: center; }
    #panel-gym td { padding: 0.22rem 0.4rem; text-align: center; }
    #panel-gym th:first-child, #panel-gym td:first-child { text-align: left; }
    #panel-gym th:nth-child(11), #panel-gym td:nth-child(11) { width: 15ch; min-width: 15ch; max-width: 15ch; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    tr.row-year  > td             { background: #0c1526; border-top-color: #1e293b; }
    tr.row-year  > td:first-child { font-weight: 700; color: #f8fafc; padding-left: 0.4rem; }
    tr.row-month > td             { background: #1e293b; }
    tr.row-month > td:first-child { font-weight: 600; color: #e2e8f0; padding-left: 1.0rem; }
    tr.row-week  > td             { background: #192131; }
    tr.row-week  > td:first-child { color: #94a3b8; padding-left: 1.8rem; }
    tr.row-day   > td             { background: #141d2e; }
    tr.row-day   > td:first-child { color: #64748b; padding-left: 2.6rem; }

    tr.row-year:hover  > td { background: #172035; }
    tr.row-month:hover > td { background: #253245; }
    tr.row-week:hover  > td { background: #1d2a3d; }

    tr.row-year, tr.row-month, tr.row-week { cursor: pointer; user-select: none; }
    tr.row-year.open  > td:first-child { color: #93c5fd; }
    tr.row-month.open > td:first-child { color: #60a5fa; }
    tr.row-month.open > td { font-weight: 700; }
    tr.row-week.open  > td:first-child { color: #a5b4fc; }

    tr.grand-total > td { border-top: 2px solid #334155; font-weight: 700; color: #f8fafc; padding: 0.35rem 0.4rem; background: #0c1526; }

    .arrow { display: inline-block; width: 0.85rem; font-size: 0.58rem; opacity: 0.55; }
    td.me  { color: #60a5fa; font-weight: 600; }
    td.mom { color: #f472b6; font-weight: 600; }
    .status { color: #475569; padding: 1.5rem; text-align: center; }
  </style>
</head>
<body>
  <div class="site-header">
    <div>
      <h1>WebSteps</h1>
      <div class="tabs">
        <button class="tab active" onclick="switchTab('gym',this)">Gym</button>
        <button class="tab" onclick="switchTab('dashboard',this)">Steps</button>
        <button class="tab" onclick="switchTab('weight',this)">Weight</button>
        <button class="tab" onclick="switchTab('me',this)">Me</button>
        <button class="tab" onclick="switchTab('mom',this)">Mom</button>
      </div>
    </div>
    <div class="header-actions">
      <span id="header-update-status" style="font-size:0.8rem;color:#64748b"></span>
      <button class="save-btn" id="header-update-btn" onclick="headerUpdate()">Update</button>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="panel-dashboard" class="panel">
    <div class="controls">
      <button class="save-btn" onclick="saveStepsView()">Save View</button>
      <span style="margin-left:auto;display:flex;gap:0.4rem;align-items:center;">
        <span style="font-size:0.75rem;color:#64748b">From</span>
        <input type="date" id="steps-from" oninput="render()" style="background:#1e293b;color:#e2e8f0;border:1px solid #334155;border-radius:4px;padding:0.28rem 0.5rem;font-size:0.82rem;">
        <span style="font-size:0.75rem;color:#64748b">To</span>
        <input type="date" id="steps-to" oninput="render()" style="background:#1e293b;color:#e2e8f0;border:1px solid #334155;border-radius:4px;padding:0.28rem 0.5rem;font-size:0.82rem;">
      </span>
    </div>
    <div class="summary" id="dash-cards"></div>
    <div class="dash-main">
      <div class="dash-table-wrap">
        <table>
          <thead><tr><th>Period</th><th>Me</th><th>Mom</th></tr></thead>
          <tbody id="dash-tbody"></tbody>
        </table>
      </div>
      <div class="chart-wrap">
        <div class="chart-title" id="chart-title">Avg steps / day</div>
        <canvas id="stepsChart"></canvas>
      </div>
    </div>
  </div>

  <!-- GYM -->
  <div id="panel-gym" class="panel active">
    <div class="controls">
      <button class="save-btn" onclick="saveGymView()">Save View</button>
      <span style="margin-left:auto;display:flex;gap:0.4rem;align-items:center;">
        <span style="font-size:0.75rem;color:#64748b">From</span>
        <input type="date" id="gym-from" oninput="renderGym()" style="background:#1e293b;color:#e2e8f0;border:1px solid #334155;border-radius:4px;padding:0.28rem 0.5rem;font-size:0.82rem;">
        <span style="font-size:0.75rem;color:#64748b">To</span>
        <input type="date" id="gym-to" oninput="renderGym()" style="background:#1e293b;color:#e2e8f0;border:1px solid #334155;border-radius:4px;padding:0.28rem 0.5rem;font-size:0.82rem;">
        <span style="font-size:0.75rem;color:#64748b;margin-left:0.6rem">Chart min</span>
        <input type="text" inputmode="numeric" id="comp-min" value="120" oninput="updateCompChart()" style="width:4rem;background:#1e293b;color:#e2e8f0;border:1px solid #334155;border-radius:4px;padding:0.28rem 0.5rem;font-size:0.9rem;text-align:right;">
        <span style="font-size:0.75rem;color:#64748b">max</span>
        <input type="text" inputmode="numeric" id="comp-max" value="190" oninput="updateCompChart()" style="width:4rem;background:#1e293b;color:#e2e8f0;border:1px solid #334155;border-radius:4px;padding:0.28rem 0.5rem;font-size:0.9rem;text-align:right;">
      </span>
    </div>
    <div class="summary" id="gym-cards"></div>
    <div class="dash-main">
      <div class="dash-table-wrap" style="flex:0 0 760px;overflow:auto;">
        <table>
          <thead><tr>
            <th style="text-align:left;width:5rem">Period</th>
            <th>Avg Wt</th>
            <th>BMI</th>
            <th>Max Wt</th>
            <th>Max BMI</th>
            <th>Bone</th>
            <th>Muscle</th>
            <th>Fat</th>
            <th>Fat%</th>
            <th>Steps</th>
            <th>Gym</th>
            <th>Avg Wt Δ</th>
            <th>Max Wt Δ</th>
          </tr></thead>
          <tbody id="gym-tbody"></tbody>
        </table>
      </div>
      <div class="chart-wrap">
        <canvas id="gymChart"></canvas>
      </div>
    </div>
  </div>

  <!-- ME -->
  <div id="panel-me" class="panel">
    <div class="controls">
      <label>From <input type="date" id="me-start" onchange="renderRaw('me')" /></label>
      <label>To &nbsp;&nbsp;<input type="date" id="me-end" onchange="renderRaw('me')" /></label>
    </div>
    <div class="summary" id="me-cards"></div>
    <div class="table-wrap" style="flex:1;min-height:0;">
      <table><thead><tr id="raw-head-me"></tr></thead><tbody id="me-tbody"></tbody></table>
    </div>
  </div>

  <!-- MOM -->
  <div id="panel-mom" class="panel">
    <div class="controls">
      <label>From <input type="date" id="mom-start" onchange="renderRaw('mom')" /></label>
      <label>To &nbsp;&nbsp;<input type="date" id="mom-end" onchange="renderRaw('mom')" /></label>
    </div>
    <div class="summary" id="mom-cards"></div>
    <div class="table-wrap" style="flex:1;min-height:0;">
      <table><thead><tr id="raw-head-mom"></tr></thead><tbody id="mom-tbody"></tbody></table>
    </div>
  </div>

  <!-- WEIGHT -->
  <div id="panel-weight" class="panel">
    <div class="controls">
      <span style="margin-left:auto;display:flex;gap:0.4rem;align-items:center;">
        <span style="font-size:0.75rem;color:#64748b">From</span>
        <input type="date" id="weight-from" oninput="renderWeight()" style="background:#1e293b;color:#e2e8f0;border:1px solid #334155;border-radius:4px;padding:0.28rem 0.5rem;font-size:0.82rem;">
        <span style="font-size:0.75rem;color:#64748b">To</span>
        <input type="date" id="weight-to" oninput="renderWeight()" style="background:#1e293b;color:#e2e8f0;border:1px solid #334155;border-radius:4px;padding:0.28rem 0.5rem;font-size:0.82rem;">
      </span>
    </div>
    <div class="summary" id="weight-cards"></div>
    <div class="table-wrap" style="flex:1;min-height:0;">
      <table>
        <thead><tr>
          <th>Date</th>
          <th>Fat</th>
          <th>Muscle</th>
          <th>Bone</th>
          <th>Gym</th>
          <th>Weight</th>
          <th>Weights</th>
          <th>BMI</th>
          <th>Steps</th>
        </tr></thead>
        <tbody id="weight-tbody"></tbody>
      </table>
    </div>
  </div>

  <script>
    let allData = {};
    let weightData = {};
    let meCreds  = null;
    let momCreds = null;
    let appConfig       = null; // parsed config.json
    let decryptedConfig = null; // in-memory only, cleared on page reload
    let sessionPassword = null; // in-memory only, for re-encrypting config after token refresh
    const STEPS_FROM = "2025-01-01";
    let stepsChart = null;
    let globalMaxSteps = 0;
    let expandedYears    = new Set();
    let expandedMonths   = new Set();
    let expandedWeeks    = new Set();
    let stepsInitialized = false;

    const RAW_COLS = [
      {key:"date",label:"Date"},{key:"steps",label:"Steps"},{key:"caloriesOut",label:"Calories"},
      {key:"activityCalories",label:"Active Cal"},{key:"caloriesBMR",label:"BMR"},
      {key:"restingHeartRate",label:"Heart Rate"},{key:"sedentaryMinutes",label:"Sedentary"},
      {key:"lightlyActiveMinutes",label:"Light"},{key:"fairlyActiveMinutes",label:"Moderate"},
      {key:"veryActiveMinutes",label:"Vigorous"},{key:"floors",label:"Floors"},
      {key:"weight",label:"Weight"},
    ];

    // ── gym tab ───────────────────────────────────────────────────────────────
    let gymExpandedYears  = new Set();
    let gymExpandedMonths = new Set();
    let gymExpandedWeeks  = new Set();
    let gymInitialized    = false;
    let gymChart = null;

    function updateCompChart() {
      if (!gymChart) return;
      const mn = parseFloat(document.getElementById("comp-min").value);
      const mx = parseFloat(document.getElementById("comp-max").value);
      if (!isNaN(mn)) gymChart.options.scales.y.min = mn;
      if (!isNaN(mx)) gymChart.options.scales.y.max = mx;
      gymChart.update();
    }
    const HEIGHT_IN = 69;

    function calcBMI(w)  { return w != null ? w * 703 / (HEIGHT_IN * HEIGHT_IN) : null; }
    function calcFatPct(fat, muscle) { return (fat != null && muscle != null) ? fat / (fat + muscle) * 100 : null; }

    function gymWeekStart(dateStr) {
      const [y,m,d] = dateStr.split("-").map(Number);
      const dt = new Date(y, m-1, d);
      const _dow = dt.getDay(); // 0=Sun
      dt.setDate(dt.getDate() - _dow); // back to Sunday
      return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,"0")}-${String(dt.getDate()).padStart(2,"0")}`;
    }
    // Steps uses a year-anchored week scheme: Jan 1 through the first Saturday
    // is always the first week of that year; remaining weeks run Sun–Sat.
    function stepsWeekStart(dateStr) {
      const [y,m,d] = dateStr.split("-").map(Number);
      const jan1Dow = new Date(y, 0, 1).getDay(); // 0=Sun, 6=Sat
      const firstSatDate = 1 + (jan1Dow === 6 ? 0 : 6 - jan1Dow);
      if (m === 1 && d <= firstSatDate) return `${y}-01-01`;
      return gymWeekStart(dateStr);
    }

    // Aggregate a set of date entries: avg weight, BMI, max weight, max BMI, gym count,
    // and the first composition measurement found (bone/muscle/fat)
    function gymAggregate(entries) {
      const weights = entries.map(e => e.weight).filter(v => v != null);
      const avgWt   = weights.length ? weights.reduce((s,v)=>s+v,0)/weights.length : null;
      const maxWt   = weights.length ? Math.max(...weights) : null;
      const stepVals = entries.map(e => e.steps).filter(v => v != null && v > 0);
      const steps    = stepVals.length ? stepVals.reduce((s,v) => s+v, 0) / stepVals.length : null;
      const gymCount = entries.filter(e => e.gym).length;
      const boneVals   = entries.map(e => e.bone).filter(v => v != null);
      const muscleVals = entries.map(e => e.muscle).filter(v => v != null);
      const fatVals    = entries.map(e => e.fat).filter(v => v != null);
      const bone   = boneVals.length   ? boneVals.reduce((s,v)=>s+v,0)/boneVals.length     : null;
      const muscle = muscleVals.length ? muscleVals.reduce((s,v)=>s+v,0)/muscleVals.length : null;
      const fat    = fatVals.length    ? fatVals.reduce((s,v)=>s+v,0)/fatVals.length       : null;
      return {
        avgWt, maxWt, steps, gymCount,
        bmi:    calcBMI(avgWt),
        maxBMI: calcBMI(maxWt),
        bone, muscle, fat,
        fatPct: calcFatPct(fat, muscle),
      };
    }

    function gymYearCols(entries, avgWtDelta=null, maxWtDelta=null, open=false) {
      const f  = (v,d=1) => v != null ? fmt(v,d) : "";
      const fp = v => v != null ? fmt(v,1)+"%" : "";
      const fd = v => v == null ? "" : (v > 0 ? "+" : "") + Number(v).toLocaleString(undefined,{maximumFractionDigits:1,minimumFractionDigits:1});
      const dc = v => v == null ? "" : v < 0 ? " class=\"green\"" : v > 0 ? " class=\"red\"" : "";
      const sorted = [...entries].sort((a,b) => a.date < b.date ? -1 : 1);
      if (!sorted[0]) return `<td></td>`.repeat(12);
      const boneVals   = entries.map(e => e.bone).filter(v => v != null);
      const muscleVals = entries.map(e => e.muscle).filter(v => v != null);
      const fatVals    = entries.map(e => e.fat).filter(v => v != null);
      const avgBone   = boneVals.length   ? boneVals.reduce((s,v)=>s+v,0)/boneVals.length     : null;
      const avgMuscle = muscleVals.length ? muscleVals.reduce((s,v)=>s+v,0)/muscleVals.length : null;
      const avgFat    = fatVals.length    ? fatVals.reduce((s,v)=>s+v,0)/fatVals.length       : null;
      const weights = entries.map(e => e.weight).filter(v => v != null);
      const avgWt = weights.length ? weights.reduce((s,v)=>s+v,0)/weights.length : null;
      const maxWt = weights.length ? Math.max(...weights) : null;
      const gymCount = entries.filter(e => e.gym).length;
      const weekCount = new Set(entries.map(e => gymWeekStart(e.date))).size;
      const sessPerWk = weekCount > 0 ? gymCount / weekCount : null;
      const stepVals = entries.map(e => e.steps).filter(v => v != null && v > 0);
      const steps = stepVals.length ? Math.round(stepVals.reduce((s,v) => s+v, 0) / stepVals.length) : null;
      return `<td>${f(avgWt)}</td><td>${f(calcBMI(avgWt))}</td>
        <td>${f(maxWt)}</td><td>${f(calcBMI(maxWt))}</td>
        <td>${open ? "" : f(avgBone)}</td><td>${open ? "" : f(avgMuscle)}</td>
        <td>${open ? "" : f(avgFat)}</td><td>${open ? "" : fp(calcFatPct(avgFat, avgMuscle))}</td>
        <td>${steps != null ? fmt(steps, 0) : ""}</td><td>${f(sessPerWk)}</td>
        <td${dc(avgWtDelta)}>${fd(avgWtDelta)}</td><td${dc(maxWtDelta)}>${fd(maxWtDelta)}</td>`;
    }

    function gymCols(agg, ex={}) {
      const f  = (v,d=1) => v != null ? fmt(v,d) : "";
      const fp = v => v != null ? fmt(v,1)+"%" : "";
      const fd = v => v == null ? "" : (v > 0 ? "+" : "") + Number(v).toLocaleString(undefined,{maximumFractionDigits:1,minimumFractionDigits:1});
      const dc = v => v == null ? "" : v < 0 ? " class=\"green\"" : v > 0 ? " class=\"red\"" : "";
      return `<td>${f(agg.avgWt)}</td><td>${f(agg.bmi)}</td>
        <td>${f(agg.maxWt)}</td><td>${f(agg.maxBMI)}</td>
        <td>${ex.hideComp ? "" : f(agg.bone)}</td><td>${ex.hideComp ? "" : f(agg.muscle)}</td>
        <td>${ex.hideComp ? "" : f(agg.fat)}</td><td>${ex.hideComp ? "" : fp(agg.fatPct)}</td>
        <td>${agg.steps != null ? fmt(agg.steps,0) : ""}</td>
        <td>${ex.gymLabel !== undefined ? ex.gymLabel : f(ex.sessPerWk,1)}</td>
        <td${dc(ex.avgWtDelta)}>${fd(ex.avgWtDelta)}</td>
        <td${dc(ex.maxWtDelta)}>${fd(ex.maxWtDelta)}</td>`;
    }

    function renderGym() {
      const today      = todayEST();
      const weekStart  = weekStartEST();
      const monthStart = monthStartEST();

      // Steps and weight lookup from me.json
      const meByDate = {};
      const meWeightByDate = {};
      for (const r of allData.me || []) { meByDate[r.date] = r.steps; meWeightByDate[r.date] = r.weight; }

      // All entries from weightData, oldest first for tree building
      const gymFrom = document.getElementById("gym-from")?.value || "";
      const gymTo   = document.getElementById("gym-to")?.value   || "";
      const weightDataDates = new Set(Object.keys(weightData));
      const baseEntries = Object.entries(weightData)
        .filter(([d]) => d <= today && (!gymFrom || d >= gymFrom) && (!gymTo || d <= gymTo))
        .map(([date, e]) => ({ date, ...e, steps: meByDate[date] ?? null, weight: meWeightByDate[date] ?? e.weight ?? null }));
      const extraEntries = (allData.me || [])
        .filter(r => (r.weight != null || r.steps > 0) && !weightDataDates.has(r.date)
                  && r.date <= today
                  && gymWeekStart(r.date).slice(0,4) === r.date.slice(0,4)
                  && (!gymFrom || r.date >= gymFrom)
                  && (!gymTo   || r.date <= gymTo))
        .map(r => ({ date: r.date, steps: meByDate[r.date] ?? null, weight: r.weight ?? null }));
      const allEntries = [...baseEntries, ...extraEntries]
        .sort((a, b) => a.date < b.date ? -1 : 1);

      const totalGym   = allEntries.filter(e => e.gym).length;
      const weekGym    = allEntries.filter(e => e.gym && e.date >= weekStart && e.date <= today).length;
      const monthGym   = allEntries.filter(e => e.gym && e.date >= monthStart && e.date <= today).length;
      const wtEntries  = allEntries.filter(e => e.weight != null);
      const latestWt   = wtEntries.length ? wtEntries[wtEntries.length-1].weight : null;
      const firstWt    = wtEntries.length ? wtEntries[0].weight : null;
      const cumDelta   = (latestWt != null && firstWt != null) ? latestWt - firstWt : null;

      // Week averages keyed by week-start date
      const weekWtMap = {};
      for (const e of wtEntries) {
        const w = gymWeekStart(e.date);
        (weekWtMap[w] = weekWtMap[w] || []).push(e.weight);
      }
      const weekAvgMap = {};
      for (const [w, ws] of Object.entries(weekWtMap))
        weekAvgMap[w] = ws.reduce((s,v)=>s+v,0) / ws.length;
      const sortedWks = Object.keys(weekAvgMap).sort();

      // Loss This Week: avg(current week) - avg(previous week)
      const thisWkAvg = weekAvgMap[weekStart] ?? null;
      const prevWkIdx = sortedWks.indexOf(weekStart) - 1;
      const prevWkAvg = prevWkIdx >= 0 ? weekAvgMap[sortedWks[prevWkIdx]] : null;
      const lossWeek  = (thisWkAvg != null && prevWkAvg != null) ? thisWkAvg - prevWkAvg : null;

      // Loss This Month: avg(this month's weights) - avg(prev month's weights)
      // Use week-bucketed months (same as table): month = gymWeekStart(entry.date).slice(0,7)
      const monthYM = weekStart.slice(0,7); // month of current week's Monday
      const [mY, mM] = monthYM.split("-").map(Number);
      const prevMonthYM = `${mM === 1 ? mY - 1 : mY}-${String(mM === 1 ? 12 : mM - 1).padStart(2, "0")}`;
      const curMonthWkAvgs  = sortedWks.filter(w => w.slice(0,7) === monthYM).map(w => weekAvgMap[w]).filter(v => v != null);
      const prevMonthWkAvgs = sortedWks.filter(w => w.slice(0,7) === prevMonthYM).map(w => weekAvgMap[w]).filter(v => v != null);
      const curMonthAvg  = curMonthWkAvgs.length  ? curMonthWkAvgs.reduce((s,v)=>s+v,0)  / curMonthWkAvgs.length  : null;
      const prevMonthAvg = prevMonthWkAvgs.length ? prevMonthWkAvgs.reduce((s,v)=>s+v,0) / prevMonthWkAvgs.length : null;
      const lossMon = (curMonthAvg != null && prevMonthAvg != null) ? curMonthAvg - prevMonthAvg : null;

      function fmtDelta(n) {
        if (n == null) return "—";
        return (n > 0 ? "+" : "") + Number(n).toLocaleString(undefined,{maximumFractionDigits:1,minimumFractionDigits:1});
      }
      function deltaClass(n) { return n == null ? "" : n < 0 ? "green" : n > 0 ? "red" : ""; }

      document.getElementById("gym-cards").innerHTML = `
        <div class="card"><div class="card-label">Latest Weight</div><div class="card-value blue">${latestWt != null ? fmt(latestWt,1) : "—"}</div></div>
        <div class="card"><div class="card-label">Weight Delta</div><div class="card-value ${deltaClass(cumDelta)}">${fmtDelta(cumDelta)}</div></div>
        <div class="card"><div class="card-label">Week Δ</div><div class="card-value ${deltaClass(lossWeek)}">${fmtDelta(lossWeek)}</div></div>
        <div class="card"><div class="card-label">Month Δ</div><div class="card-value ${deltaClass(lossMon)}">${fmtDelta(lossMon)}</div></div>
      `;

      // Build year > month > week > day tree
      // Week belongs to the month/year of its Monday (week start), not the individual day's month
      const tree = {};
      for (const e of allEntries) {
        const week      = gymWeekStart(e.date);
        const year      = week.slice(0,4);
        const month     = week.slice(0,7);
        if (!tree[year])              tree[year] = {};
        if (!tree[year][month])       tree[year][month] = {};
        if (!tree[year][month][week]) tree[year][month][week] = [];
        tree[year][month][week].push(e);
      }

      // On first render: restore saved view or default to week level
      if (!gymInitialized) {
        gymInitialized = true;
        const reloadKey = localStorage.getItem("gymViewReload");
        if (reloadKey) { localStorage.removeItem("gymViewReload"); }
        const saved = reloadKey || localStorage.getItem("gymView");
        if (saved) {
          const s = JSON.parse(saved);
          if (s.v === 2) {
            s.years.forEach(y  => gymExpandedYears.add(y));
            (s.months||[]).forEach(m => gymExpandedMonths.add(m));
            s.weeks.forEach(w  => gymExpandedWeeks.add(w));
          } else {
            localStorage.removeItem("gymView"); // discard old format
          }
        }
      }

      // Precompute all week aggregates for delta lookups
      const allWeekAggs = {};
      for (const y of Object.keys(tree))
        for (const m of Object.keys(tree[y]))
          for (const w of Object.keys(tree[y][m]))
            allWeekAggs[w] = gymAggregate(tree[y][m][w]);
      const sortedWeeks = Object.keys(allWeekAggs).sort();

      const allMonthAggs = {};
      for (const y of Object.keys(tree))
        for (const m of Object.keys(tree[y])) {
          const base = gymAggregate(Object.values(tree[y][m]).flat());
          const wAvgs = Object.keys(tree[y][m]).map(w => allWeekAggs[w]?.avgWt).filter(v => v != null);
          base.avgWt = wAvgs.length ? wAvgs.reduce((s,v)=>s+v,0)/wAvgs.length : null;
          base.bmi = calcBMI(base.avgWt);
          allMonthAggs[m] = base;
        }
      const sortedMonths = Object.keys(allMonthAggs).sort();

      const allYearAggs = {};
      for (const y of Object.keys(tree)) {
        const base = gymAggregate(Object.values(tree[y]).flatMap(m => Object.values(m)).flat());
        const mAvgs = Object.keys(tree[y]).map(m => allMonthAggs[m]?.avgWt).filter(v => v != null);
        base.avgWt = mAvgs.length ? mAvgs.reduce((s,v)=>s+v,0)/mAvgs.length : null;
        base.bmi = calcBMI(base.avgWt);
        allYearAggs[y] = base;
      }
      const sortedYears = Object.keys(allYearAggs).sort();

      const sortedWtEntries = allEntries.filter(e => e.weight != null);
      const dayWtDelta = {};
      sortedWtEntries.forEach((e, i) => {
        dayWtDelta[e.date] = i > 0 ? e.weight - sortedWtEntries[i-1].weight : null;
      });

      const grand = gymAggregate(allEntries);
      const years = Object.keys(tree).sort(); // ascending
      let html = "";
      const emptyCols = `<td></td>`.repeat(12);
      const chartItems = []; // { label, weeks[] } — leaves of the visible tree

      // avg-of-week-averages for a set of week keys
      function weekAvgWt(weeks) {
        const v = weeks.map(w => allWeekAggs[w]?.avgWt).filter(x => x != null);
        return v.length ? v.reduce((s,x)=>s+x,0)/v.length : null;
      }
      function weekAvgMax(weeks) {
        const v = weeks.map(w => allWeekAggs[w]?.maxWt).filter(x => x != null);
        return v.length ? Math.max(...v) : null;
      }

      for (const year of years) {
        const yOpen = gymExpandedYears.has(year);
        const yEntries = Object.values(tree[year]).flatMap(m => Object.values(m)).flat();
        const yi = sortedYears.indexOf(year);
        const prevYearAgg = yi > 0 ? allYearAggs[sortedYears[yi-1]] : null;
        const yAvgDelta = (allYearAggs[year]?.avgWt != null && prevYearAgg?.avgWt != null) ? allYearAggs[year].avgWt - prevYearAgg.avgWt : null;
        const yMaxDelta = (allYearAggs[year]?.maxWt != null && prevYearAgg?.maxWt != null) ? allYearAggs[year].maxWt - prevYearAgg.maxWt : null;
        html += `<tr class="row-year${yOpen?" open":""}" onclick="toggleGymYear('${year}')">
          <td><span class="arrow">${yOpen?"▼":"▶"}</span>${year}</td>${gymYearCols(yEntries, yAvgDelta, yMaxDelta, yOpen)}</tr>`;
        if (!yOpen) {
          const sortedYearMonths = Object.keys(tree[year]).sort();
          const yAgg = allYearAggs[year];
          const yWeeks = sortedYearMonths.flatMap(m => Object.keys(tree[year][m]));
          const ySessTotal = yWeeks.reduce((s,w) => s + (allWeekAggs[w]?.gymCount || 0), 0);
          const ySess = yWeeks.length ? ySessTotal / yWeeks.length : null;
          sortedYearMonths.forEach((month, mi) => {
            const mEntries = Object.values(tree[year][month]).flat();
            const mAgg = gymAggregate(mEntries);
            const [,mm] = month.split("-");
            const mLabel = new Date(2000,+mm-1).toLocaleString("default",{month:"short"});
            chartItems.push({
              cy: year, cm: null, cw: null,
              weeks: Object.keys(tree[year][month]),
              bone: mAgg.bone??null, muscle: mAgg.muscle??null, fat: mAgg.fat??null,
              avgWt: mi === 0 ? (yAgg?.avgWt??null) : null,
              maxWt: mi === 0 ? (yAgg?.maxWt??null) : null,
              sess:  ySess,
            });
          });
          continue;
        }

        for (const month of Object.keys(tree[year]).sort()) {
          const mEntries = Object.values(tree[year][month]).flat();
          const mAgg = gymAggregate(mEntries);
          const mOpen = gymExpandedMonths.has(month);
          const [,mm] = month.split("-");
          const mLabel = new Date(2000,+mm-1).toLocaleString("default",{month:"short"});
          const mWeekCount = Object.keys(tree[year][month]).length;
          const mi = sortedMonths.indexOf(month);
          const prevMonthAgg = mi > 0 ? allMonthAggs[sortedMonths[mi-1]] : null;
          const mEx = {
            sessPerWk: mWeekCount ? mAgg.gymCount / mWeekCount : null,
            avgWtDelta: (mAgg.avgWt != null && prevMonthAgg?.avgWt != null) ? mAgg.avgWt - prevMonthAgg.avgWt : null,
            maxWtDelta: (mAgg.maxWt != null && prevMonthAgg?.maxWt != null) ? mAgg.maxWt - prevMonthAgg.maxWt : null,
            hideComp: mOpen,
          };
          html += `<tr class="row-month${mOpen?" open":""}" onclick="toggleGymMonth('${month}')">
            <td><span class="arrow">${mOpen?"▼":"▶"}</span>${mLabel}</td>${gymCols(mAgg, mEx)}</tr>`;
          if (!mOpen) {
            chartItems.push({ cy: year, cm: mLabel, cw: null, weeks: Object.keys(tree[year][month]), bone: mAgg.bone??null, muscle: mAgg.muscle??null, fat: mAgg.fat??null });
            continue;
          }

          for (const week of Object.keys(tree[year][month]).sort()) {
            const wEntries = tree[year][month][week];
            const wAgg = allWeekAggs[week];
            const wOpen = gymExpandedWeeks.has(week);
            const [wy,wm,wd] = week.split("-").map(Number);
            const wLabel = new Date(wy,wm-1,wd).toLocaleString("default",{month:"short",day:"numeric"});
            const wi = sortedWeeks.indexOf(week);
            const prevAgg = wi > 0 ? allWeekAggs[sortedWeeks[wi-1]] : null;
            const wEx = {
              sessPerWk: wAgg.gymCount,
              avgWtDelta: (wAgg.avgWt != null && prevAgg?.avgWt != null) ? wAgg.avgWt - prevAgg.avgWt : null,
              maxWtDelta: (wAgg.maxWt != null && prevAgg?.maxWt != null) ? wAgg.maxWt - prevAgg.maxWt : null,
              hideComp: wOpen,
            };
            html += `<tr class="row-week${wOpen?" open":""}" onclick="toggleGymWeek('${week}')">
              <td><span class="arrow">${wOpen?"▼":"▶"}</span>${wLabel}</td>${gymCols(wAgg, wEx)}</tr>`;
            if (!wOpen) {
              chartItems.push({ cy: year, cm: mLabel, cw: wLabel, weeks: [week], bone: wAgg.bone??null, muscle: wAgg.muscle??null, fat: wAgg.fat??null });
            }
            if (!wOpen) continue;

            for (const e of wEntries) {
              const [dy,dm,dd] = e.date.split("-").map(Number);
              const dLabel = new Date(dy,dm-1,dd).toLocaleString("default",{month:"short",day:"numeric"});
              const dDelta = dayWtDelta[e.date] ?? null;
              html += `<tr class="row-day">
                <td><span class="arrow"></span>${dLabel}</td>${gymCols(gymAggregate([e]), { gymLabel: e.gym || "", avgWtDelta: dDelta, maxWtDelta: dDelta })}</tr>`;
              chartItems.push({
                cy: year, cm: mLabel, cw: wLabel, cd: dLabel,
                avgWt: e.weight ?? null, maxWt: e.weight ?? null, sess: null,
                bone: e.bone ?? null, muscle: e.muscle ?? null, fat: e.fat ?? null,
                weeks: [week],
              });
            }
          }
        }
      }
      html += `<tr class="grand-total"><td>Grand Total</td>${gymCols(grand)}</tr>`;
      document.getElementById("gym-tbody").innerHTML = html;

      // Combined chart — stacked bars (bone/muscle/fat) + lines (avg/max weight)
      // Build 4-line hierarchical x-axis labels; suppress repeated year/month/week
      chartItems.forEach((item, i) => {
        const prev = i > 0 ? chartItems[i-1] : null;
        if (item.avgWt === undefined) { item.avgWt = weekAvgWt(item.weeks); item.maxWt = weekAvgMax(item.weeks); }
        item.label = [
          item.cd || "",
          item.cw && item.cw !== prev?.cw ? item.cw : "",
          item.cm && item.cm !== prev?.cm ? item.cm : "",
          item.cy && item.cy !== prev?.cy ? item.cy : "",
        ];
      });
      const chartLabels = chartItems.map(i => i.label);
      const avgWts = chartItems.map(i => i.avgWt);
      const maxWts = chartItems.map(i => i.maxWt);
      const compMin = parseFloat(document.getElementById("comp-min").value) || 120;
      const compMax = parseFloat(document.getElementById("comp-max").value) || 190;
      const sessData = chartItems.map(i => {
        if (i.sess !== undefined) return i.sess;
        const total = i.weeks.reduce((s,w) => s + (allWeekAggs[w]?.gymCount || 0), 0);
        return i.weeks.length ? total / i.weeks.length : null;
      });
      const gymTickPlugin = {
        id: 'gymTicks',
        afterDraw(chart) {
          const xScale = chart.scales.x;
          if (!xScale) return;
          const lbs = chart.data.labels;
          if (!lbs || !lbs.length) return;
          const axisTop = chart.chartArea.bottom;
          const axisBot = xScale.bottom;
          const rowH    = (axisBot - axisTop) / 4;
          const ctx     = chart.ctx;
          ctx.save();
          ctx.strokeStyle = '#475569';
          ctx.lineWidth   = 1;
          lbs.forEach((lbl, idx) => {
            let depth = 4; // year default
            if (Array.isArray(lbl)) {
              if      (lbl[0] !== '') depth = 1; // day
              else if (lbl[1] !== '') depth = 2; // week
              else if (lbl[2] !== '') depth = 3; // month
            }
            const x = xScale.getPixelForValue(idx - 0.5);
            ctx.beginPath();
            ctx.moveTo(x, axisTop);
            ctx.lineTo(x, axisTop + rowH * depth);
            ctx.stroke();
          });
          ctx.restore();
        }
      };

      if (gymChart) gymChart.destroy();
      gymChart = new Chart(document.getElementById("gymChart"), {
        plugins: [gymTickPlugin],
        data: {
          labels: chartLabels,
          datasets: [
            { type: "bar",  label: "Gym", data: sessData, yAxisID: "y2", backgroundColor: "rgba(74,222,128,0.13)", borderWidth: 0, barPercentage: 1.0, categoryPercentage: 1.0, order: 10 },
            { type: "bar",  label: "Bone",   data: chartItems.map(i => i.bone),   backgroundColor: "rgba(251,191,36,0.80)",  stack: "comp", barPercentage: 0.5, order: 2 },
            { type: "bar",  label: "Muscle", data: chartItems.map(i => i.muscle), backgroundColor: "rgba(96,165,250,0.80)",  stack: "comp", barPercentage: 0.5, order: 2 },
            { type: "bar",  label: "Fat",    data: chartItems.map(i => i.fat),    backgroundColor: "rgba(244,114,182,0.80)", stack: "comp", barPercentage: 0.5, order: 2 },
            { type: "line", label: "Avg Wt", data: avgWts, borderColor: "rgba(255,255,255,0.85)", backgroundColor: "transparent", borderWidth: 2, pointRadius: 2, tension: 0.3, order: 1 },
            { type: "line", label: "Max Wt", data: maxWts, borderColor: "rgba(148,163,184,0.7)",  backgroundColor: "transparent", borderWidth: 1.5, pointRadius: 2, tension: 0.3, borderDash: [4,3], order: 1 },
          ],
        },
        options: {
          animation: false,
          responsive: true,
          maintainAspectRatio: false,
          datasets: { bar: { grouped: false } },
          plugins: {
            legend: { labels: { color: "#94a3b8" } },
            tooltip: { callbacks: { label: ctx => ` ${ctx.dataset.label}: ${fmt(ctx.parsed.y,1)}` } },
          },
          scales: {
            x: { ticks: { color: "#64748b", maxRotation: 45 }, grid: { color: "#1e293b", drawTicks: false } },
            y:  { min: compMin, max: compMax, ticks: { color: "#64748b", callback: v => fmt(v,1) }, grid: { color: "#334155" } },
            y2: { min: 0, max: 7, position: "right", ticks: { color: "#64748b", stepSize: 1 }, grid: { drawOnChartArea: false } },
          },
        },
      });
    }

    function toggleGymYear(year) {
      if (gymExpandedYears.has(year)) {
        gymExpandedYears.delete(year);
        for (const m of [...gymExpandedMonths]) if (m.startsWith(year)) {
          gymExpandedMonths.delete(m);
          for (const w of [...gymExpandedWeeks]) if (w.startsWith(m)) gymExpandedWeeks.delete(w);
        }
      } else {
        gymExpandedYears.add(year);
        for (const m of [...gymExpandedMonths]) if (m.startsWith(year)) {
          gymExpandedMonths.delete(m);
          for (const w of [...gymExpandedWeeks]) if (w.startsWith(m)) gymExpandedWeeks.delete(w);
        }
      }
      renderGym();
    }
    function toggleGymMonth(month) {
      if (gymExpandedMonths.has(month)) {
        gymExpandedMonths.delete(month);
        for (const w of [...gymExpandedWeeks]) if (w.startsWith(month)) gymExpandedWeeks.delete(w);
      } else { gymExpandedMonths.add(month); }
      renderGym();
    }
    function toggleGymWeek(week) {
      gymExpandedWeeks.has(week) ? gymExpandedWeeks.delete(week) : gymExpandedWeeks.add(week);
      renderGym();
    }
    function saveGymView() {
      localStorage.setItem("gymView", JSON.stringify({
        v: 2,
        years:  [...gymExpandedYears],
        months: [...gymExpandedMonths],
        weeks:  [...gymExpandedWeeks],
      }));
      const btn = [...document.querySelectorAll(".save-btn")].find(b => b.textContent.trim() === "Save View");
      if (btn) { btn.textContent = "Saved ✓"; setTimeout(() => btn.textContent = "Save View", 1500); }
    }

    // ── init ──────────────────────────────────────────────────────────────────
    async function init() {
      const cacheBust = "?t=" + Date.now();
      const configRes = await fetch("config.json" + cacheBust).catch(() => null);
      appConfig = null;
      if (configRes?.ok) { try { appConfig = await configRes.json(); } catch {} }

      let meParsed, momParsed, staticWeight;
      // Prefer Gist's config.json for latest rotated tokens
      const gistId    = appConfig?.gistId;
      const gistOwner = appConfig?.gistOwner || "michael-tint";
      if (gistId) {
        const raw = `https://gist.githubusercontent.com/${gistOwner}/${gistId}/raw`;
        const [gistConfigRes, meRes, momRes, weightRes] = await Promise.all([
          fetch(`${raw}/config.json${cacheBust}`).catch(() => null),
          fetch(`${raw}/me.json${cacheBust}`).catch(() => null),
          fetch(`${raw}/mom.json${cacheBust}`).catch(() => null),
          fetch(`${raw}/weight_data.json${cacheBust}`).catch(() => null),
        ]);
        if (gistConfigRes?.ok) {
          try { appConfig = { ...appConfig, ...await gistConfigRes.json() }; } catch {}
        }
        meParsed     = (meRes?.ok)     ? await meRes.json()     : {};
        momParsed    = (momRes?.ok)    ? await momRes.json()    : {};
        staticWeight = (weightRes?.ok) ? await weightRes.json() : {};
      } else {
        const [meRes, momRes, weightRes] = await Promise.all([
          fetch("me.json"          + cacheBust).catch(() => null),
          fetch("mom.json"         + cacheBust).catch(() => null),
          fetch("weight_data.json" + cacheBust).catch(() => null),
        ]);
        meParsed     = (meRes?.ok)     ? await meRes.json()     : {};
        momParsed    = (momRes?.ok)    ? await momRes.json()    : {};
        staticWeight = (weightRes?.ok) ? await weightRes.json() : {};
      }
      allData = {
        me:  (meParsed.data  || []).filter(r => r.date >= STEPS_FROM),
        mom: (momParsed.data || (Array.isArray(momParsed) ? momParsed : [])).filter(r => r.date >= STEPS_FROM),
      };
      weightData = staticWeight || {};

      // Global max for fixed Y axis
      for (const r of [...(allData.me||[]), ...(allData.mom||[])].filter(r => r.date >= STEPS_FROM))
        if (r.steps > globalMaxSteps) globalMaxSteps = r.steps;

      stepsInitialized = false; // reset so render() re-runs init on next call

      for (const user of ["me","mom"]) {
        const dates = (allData[user]||[]).map(r=>r.date).sort();
        if (dates.length) {
          document.getElementById(`${user}-start`).value = dates[0];
          document.getElementById(`${user}-end`).value   = dates[dates.length-1];
        }
        document.getElementById(`raw-head-${user}`).innerHTML = RAW_COLS.map(c=>`<th>${c.label}</th>`).join("") + `<th></th>`;
      }
      renderDashboard();

      // Restore last-visited tab (default is gym)
      const lastTab = localStorage.getItem("lastTab") || "gym";
      if (lastTab !== "gym") {
        const btn = [...document.querySelectorAll(".tab")].find(b => b.getAttribute("onclick").includes(`'${lastTab}'`));
        if (btn) switchTab(lastTab, btn);
      } else {
        renderGym();
      }
    }

    // ── header update button ──────────────────────────────────────────────────
    function headerUpdate() {
      const btn = document.getElementById('header-update-btn');
      const statusEl = document.getElementById('header-update-status');
      const activeTab = localStorage.getItem('lastTab') || 'gym';
      if (activeTab === 'me') updateFitbitMe(btn, statusEl);
      else if (activeTab === 'mom') updateFitbitMom(btn, statusEl);
      else updateFitbitBoth(btn, statusEl);
    }

    // ── tab switching ─────────────────────────────────────────────────────────
    function switchTab(name, btn) {
      document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
      document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"));
      btn.classList.add("active");
      document.getElementById(`panel-${name}`).classList.add("active");
      localStorage.setItem("lastTab", name);
      if (name==="me"     && !document.getElementById("me-tbody").innerHTML)     renderRaw("me");
if (name==="mom"    && !document.getElementById("mom-tbody").innerHTML)    renderRaw("mom");
      if (name==="weight") renderWeight();
      if (name==="gym")    renderGym();
    }

    // ── EST date helpers ──────────────────────────────────────────────────────
    function todayEST() {
      return new Intl.DateTimeFormat("en-CA", { timeZone: "America/New_York" }).format(new Date());
    }
    function weekStartEST() {
      const s = todayEST();
      const [y,m,d] = s.split("-").map(Number);
      const dt = new Date(y, m-1, d);
      const dow = dt.getDay(); // 0=Sun
      dt.setDate(dt.getDate() - dow); // back to Sunday
      return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,"0")}-${String(dt.getDate()).padStart(2,"0")}`;
    }
    function monthStartEST() {
      return todayEST().slice(0,8) + "01";
    }

    // ── helpers ───────────────────────────────────────────────────────────────
    function fmt(n, dec=0) {
      if (n==null) return "—";
      return Number(n).toLocaleString(undefined,{maximumFractionDigits:dec});
    }
    function avgSteps(rows) {
      const v=rows.filter(r=>r.steps!=null);
      return v.length ? v.reduce((s,r)=>s+r.steps,0)/v.length : null;
    }
    function groupBy(rows, fn) {
      const m={};
      for (const r of rows) { const k=fn(r); (m[k]=m[k]||[]).push(r); }
      return m;
    }
    function mergeKeys(...maps) {
      return [...new Set(maps.flatMap(m=>Object.keys(m)))].sort();
    }
    function labelYear(y)   { return y; }
    function labelMonth(ym) { const [y,m]=ym.split("-"); return new Date(+y,+m-1).toLocaleString("default",{month:"short"}); }
    function labelWeek(iso) { const [y,m,d]=iso.split("-"); return new Date(+y,+m-1,+d).toLocaleString("default",{month:"short",day:"numeric"}); }
    function labelDay(iso)  { const [y,m,d]=iso.split("-"); return new Date(+y,+m-1,+d).toLocaleString("default",{month:"short",day:"numeric"}); }

    // ── reference average (next level up) ────────────────────────────────────
    function computeRef(user, item) {
      const rows = (allData[user] || []).filter(r => r.date >= STEPS_FROM);
      if (item.type === 'year') {
        return avgSteps(rows);
      }
      if (item.type === 'month') {
        const [y, m] = item.key.split('-');
        const qStart = Math.floor((+m-1)/3)*3+1;
        return avgSteps(rows.filter(r => {
          if (!r.date.startsWith(y)) return false;
          const mo = +r.date.slice(5,7);
          return mo >= qStart && mo < qStart+3;
        }));
      }
      if (item.type === 'week') {
        return avgSteps(rows.filter(r => r.date.startsWith(item.monthKey)));
      }
      if (item.type === 'day') {
        return avgSteps(rows.filter(r => stepsWeekStart(r.date) === item.weekKey));
      }
      return null;
    }

    // ── build flat item list ──────────────────────────────────────────────────
    function buildItems() {
      const items = [];
      const stepsFrom = document.getElementById("steps-from")?.value || "";
      const stepsTo   = document.getElementById("steps-to")?.value   || "";
      const meAll  = (allData.me  || []).filter(r => r.date >= STEPS_FROM && (!stepsFrom || r.date >= stepsFrom) && (!stepsTo || r.date <= stepsTo));
      const momAll = (allData.mom || []).filter(r => r.date >= STEPS_FROM && (!stepsFrom || r.date >= stepsFrom) && (!stepsTo || r.date <= stepsTo));
      const meYears  = groupBy(meAll,  r=>r.date.slice(0,4));
      const momYears = groupBy(momAll, r=>r.date.slice(0,4));
      const years    = mergeKeys(meYears, momYears);

      for (const year of years) {
        const meY  = meYears[year]  || [];
        const momY = momYears[year] || [];
        if (!expandedYears.has(year)) {
          items.push({ type:"year", key:year, label:labelYear(year), me:avgSteps(meY), mom:avgSteps(momY) });
          continue;
        }
        items.push({ type:"year", key:year, label:labelYear(year), me:avgSteps(meY), mom:avgSteps(momY), open:true });

        const meMonths  = groupBy(meY,  r=>stepsWeekStart(r.date).slice(0,7));
        const momMonths = groupBy(momY, r=>stepsWeekStart(r.date).slice(0,7));
        const months    = mergeKeys(meMonths, momMonths);

        for (const month of months) {
          const meM  = meMonths[month]  || [];
          const momM = momMonths[month] || [];
          if (!expandedMonths.has(month)) {
            items.push({ type:"month", key:month, label:labelMonth(month), me:avgSteps(meM), mom:avgSteps(momM) });
            continue;
          }
          items.push({ type:"month", key:month, label:labelMonth(month), me:avgSteps(meM), mom:avgSteps(momM), open:true });

          const meWeeks  = groupBy(meM,  r=>stepsWeekStart(r.date));
          const momWeeks = groupBy(momM, r=>stepsWeekStart(r.date));
          const weeks    = mergeKeys(meWeeks, momWeeks);

          for (const week of weeks) {
            const meW  = meWeeks[week]  || [];
            const momW = momWeeks[week] || [];
            if (!expandedWeeks.has(week)) {
              items.push({ type:"week", key:week, label:labelWeek(week), me:avgSteps(meW), mom:avgSteps(momW), monthKey:month });
              continue;
            }
            items.push({ type:"week", key:week, label:labelWeek(week), me:avgSteps(meW), mom:avgSteps(momW), monthKey:month, open:true });

            const meD={}, momD={};
            for (const r of meM)  if (stepsWeekStart(r.date)===week) meD[r.date]=r;
            for (const r of momM) if (stepsWeekStart(r.date)===week) momD[r.date]=r;
            const days = mergeKeys(meD, momD);
            for (const day of days)
              items.push({ type:"day", key:day, label:labelDay(day), me:meD[day]?.steps??null, mom:momD[day]?.steps??null, weekKey:week, monthKey:month });
          }
        }
      }
      return items;
    }

    // ── toggle handlers ───────────────────────────────────────────────────────
    function toggleYear(year) {
      if (expandedYears.has(year)) {
        expandedYears.delete(year);
        for (const m of [...expandedMonths]) if (m.startsWith(year)) {
          expandedMonths.delete(m);
          for (const w of [...expandedWeeks]) if (w.startsWith(m)) expandedWeeks.delete(w);
        }
      } else {
        expandedYears.add(year);
        for (const m of [...expandedMonths]) if (m.startsWith(year)) {
          expandedMonths.delete(m);
          for (const w of [...expandedWeeks]) if (w.startsWith(m)) expandedWeeks.delete(w);
        }
      }
      render();
    }
    function toggleMonth(month) {
      if (expandedMonths.has(month)) {
        expandedMonths.delete(month);
        for (const w of [...expandedWeeks]) if (w.startsWith(month)) expandedWeeks.delete(w);
      } else { expandedMonths.add(month); }
      render();
    }
    function toggleWeek(week) {
      expandedWeeks.has(week) ? expandedWeeks.delete(week) : expandedWeeks.add(week);
      render();
    }

    // ── render pivot table ────────────────────────────────────────────────────
    function renderPivotTable(items) {
      const toggleFn = { year:"toggleYear", month:"toggleMonth", week:"toggleWeek" };
      let html = "";
      for (const item of items) {
        if (item.type==="day") {
          html += `<tr class="row-day"><td><span class="arrow"></span>${item.label}</td><td class="me">${fmt(item.me)}</td><td class="mom">${fmt(item.mom)}</td></tr>`;
        } else {
          const arrow = item.open ? "▼" : "▶";
          html += `<tr class="row-${item.type}${item.open?" open":""}" onclick="${toggleFn[item.type]}('${item.key}')">
            <td><span class="arrow">${arrow}</span>${item.label}</td>
            <td class="me">${fmt(item.me)}</td><td class="mom">${fmt(item.mom)}</td>
          </tr>`;
        }
      }
      const meGrand = avgSteps(allData.me||[]), momGrand = avgSteps(allData.mom||[]);
      html += `<tr class="grand-total"><td>Grand Total</td><td class="me">${fmt(meGrand)}</td><td class="mom">${fmt(momGrand)}</td></tr>`;
      document.getElementById("dash-tbody").innerHTML = html;
    }

    // ── render chart ──────────────────────────────────────────────────────────
    function renderChart(items) {
      const leaves = items.filter(i => !i.open);

      // Always 4-row labels so x-axis height never shifts on expand/collapse
      // Row order (top→bottom): day, week, month, year
      const labels = leaves.map(i =>
        i.type === 'day'   ? [i.label, '', '', ''] :
        i.type === 'week'  ? ['', i.label, '', ''] :
        i.type === 'month' ? ['', '', i.label, ''] :
        ['', '', '', i.label]
      );
      const me    = leaves.map(i => i.me);
      const mom   = leaves.map(i => i.mom);
      const meRef = leaves.map(i => computeRef('me',  i));
      const momRef= leaves.map(i => computeRef('mom', i));

      // Plugin: draw variable-depth tick marks (day=1 row, week=2, month=3, year=4)
      const stepsTickPlugin = {
        id: 'stepsTicks',
        afterDraw(chart) {
          const xScale = chart.scales.x;
          if (!xScale) return;
          const lbs = chart.data.labels;
          if (!lbs || !lbs.length) return;
          const axisTop  = chart.chartArea.bottom;
          const axisBot  = xScale.bottom;
          const rowH     = (axisBot - axisTop) / 4;
          const ctx      = chart.ctx;
          ctx.save();
          ctx.strokeStyle = '#475569';
          ctx.lineWidth   = 1;
          lbs.forEach((lbl, idx) => {
            let depth = 4; // year default
            if (Array.isArray(lbl)) {
              if      (lbl[0] !== '') depth = 1; // day
              else if (lbl[1] !== '') depth = 2; // week
              else if (lbl[2] !== '') depth = 3; // month
            }
            const x = xScale.getPixelForValue(idx - 0.5);
            ctx.beginPath();
            ctx.moveTo(x, axisTop);
            ctx.lineTo(x, axisTop + rowH * depth);
            ctx.stroke();
          });
          ctx.restore();
        }
      };

      if (stepsChart) stepsChart.destroy();
      stepsChart = new Chart(document.getElementById("stepsChart"), {
        type: "bar",
        plugins: [stepsTickPlugin],
        data: {
          labels,
          datasets: [
            // Reference areas behind bars (higher order = drawn first/behind)
            {
              type:"line", label:"_ref_me", data:meRef,
              backgroundColor:"rgba(96,165,250,0.22)",
              borderColor:"rgba(96,165,250,0.55)", borderWidth:1.5,
              fill:"origin", pointRadius:0, pointHoverRadius:0,
              tension:0.4, order:2,
            },
            {
              type:"line", label:"_ref_mom", data:momRef,
              backgroundColor:"rgba(244,114,182,0.22)",
              borderColor:"rgba(244,114,182,0.55)", borderWidth:1.5,
              fill:"origin", pointRadius:0, pointHoverRadius:0,
              tension:0.4, order:2,
            },
            // Bars on top
            { label:"Me",  data:me,  backgroundColor:"rgba(96,165,250,0.80)",  borderWidth:0, borderRadius:3, order:1 },
            { label:"Mom", data:mom, backgroundColor:"rgba(244,114,182,0.80)", borderWidth:0, borderRadius:3, order:1 },
          ],
        },
        options: {
          animation: false,
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              labels: {
                color: "#94a3b8",
                filter: item => !item.text.startsWith("_ref_"),
              }
            },
            tooltip: {
              callbacks: {
                label: ctx => ctx.dataset.label.startsWith("_ref_") ? null
                  : ` ${ctx.dataset.label}: ${fmt(ctx.parsed.y)} steps`,
              }
            },
          },
          scales: {
            x: { ticks:{ color:"#64748b", maxRotation:45 }, grid:{ color:"#1e293b", drawTicks:false } },
            y: {
              beginAtZero: true,
              max: 20000,
              ticks:{ color:"#64748b", callback:v=>fmt(v) },
              grid:{ color:"#334155" },
              title:{ display:true, text:"Steps", color:"#64748b" },
            },
          },
        },
      });
    }

    // ── main render ───────────────────────────────────────────────────────────
    function render() {
      if (!stepsInitialized) {
        stepsInitialized = true;
        expandedYears.clear(); expandedMonths.clear(); expandedWeeks.clear();
        const reloadKey = localStorage.getItem("stepsViewReload");
        if (reloadKey) { localStorage.removeItem("stepsViewReload"); }
        const saved = reloadKey || localStorage.getItem("stepsView");
        if (saved) {
          const s = JSON.parse(saved);
          if (s.v === 1) {
            s.years.forEach(y => expandedYears.add(y));
            s.months.forEach(m => expandedMonths.add(m));
            s.weeks.forEach(w => expandedWeeks.add(w));
          } else {
            localStorage.removeItem("stepsView");
            for (const r of [...(allData.me||[]), ...(allData.mom||[])])
              expandedYears.add(r.date.slice(0,4));
          }
        } else {
          for (const r of [...(allData.me||[]), ...(allData.mom||[])])
            expandedYears.add(r.date.slice(0,4));
        }
      }
      const items = buildItems();
      renderPivotTable(items);
      renderChart(items);
    }

      }).join("");
    }

    // ── crypto helpers ────────────────────────────────────────────────────────
    async function deriveKey(password, salt) {
      const enc = new TextEncoder();
      const keyMaterial = await crypto.subtle.importKey("raw", enc.encode(password), "PBKDF2", false, ["deriveKey"]);
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt, iterations: 100000, hash: "SHA-256" },
        keyMaterial, { name: "AES-GCM", length: 256 }, false, ["encrypt", "decrypt"]
      );
    }

    function fromB64(b64) { return Uint8Array.from(atob(b64), c => c.charCodeAt(0)); }
    function toB64(buf)   { let s = ""; const b = new Uint8Array(buf); for (let i = 0; i < b.length; i++) s += String.fromCharCode(b[i]); return btoa(s); }

    async function decryptAppConfig(encryptedBlob, saltB64, ivB64, password) {
      const key       = await deriveKey(password, fromB64(saltB64));
      const decrypted = await crypto.subtle.decrypt({ name: "AES-GCM", iv: fromB64(ivB64) }, key, fromB64(encryptedBlob));
      return JSON.parse(new TextDecoder().decode(decrypted));
    }

    async function encryptAndSaveConfig(data, setStatus) {
      if (!sessionPassword || !appConfig) return;
      const salt      = crypto.getRandomValues(new Uint8Array(16));
      const iv        = crypto.getRandomValues(new Uint8Array(12));
      const key       = await deriveKey(sessionPassword, salt);
      const encrypted = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, key, new TextEncoder().encode(JSON.stringify(data)));
      const newConfig = { ...appConfig, encryptedBlob: toB64(encrypted), salt: toB64(salt), iv: toB64(iv) };
      appConfig = newConfig;
      await patchGist({ "config.json": { content: JSON.stringify(newConfig, null, 2) } }, data.gh_pat);
    }

    async function getDecryptedConfig(setStatus) {
      if (decryptedConfig) return decryptedConfig;
      if (!appConfig) {
        if (setStatus) setStatus("No config.json found. Run setup.html first.", "#f87171");
        return null;
      }
      const password = "websteps123";
      try {
        const data = await decryptAppConfig(appConfig.encryptedBlob, appConfig.salt, appConfig.iv, password);
        sessionPassword = password;
        decryptedConfig = data;
        return data;
      } catch {
        if (setStatus) setStatus("Wrong password.", "#f87171");
        return null;
      }
    }

    // ── Gist data store ───────────────────────────────────────────────────────
    async function patchGist(files, pat) {
      const gistId = appConfig?.gistId;
      if (!gistId) return false;
      const res = await fetch(`https://api.github.com/gists/${gistId}`, {
        method: "PATCH",
        headers: { "Authorization": `Bearer ${pat}`, "Accept": "application/vnd.github+json", "Content-Type": "application/json" },
        body: JSON.stringify({ files }),
      }).catch(() => null);
      return res?.ok ?? false;
    }

    // ── GitHub Contents API (config.json only) ────────────────────────────────
    async function writeRepoFile(repo, path, content, message, pat, setStatus) {
      const url     = `https://api.github.com/repos/${repo}/contents/${path}`;
      const headers = { "Authorization": `Bearer ${pat}`, "Accept": "application/vnd.github+json", "Content-Type": "application/json" };
      const encoded = toB64(new TextEncoder().encode(content));
      for (let attempt = 0; attempt < 3; attempt++) {
        const getRes = await fetch(url, { headers }).catch(() => null);
        const sha    = getRes?.ok ? (await getRes.json()).sha : undefined;
        const body   = { message, content: encoded };
        if (sha) body.sha = sha;
        const putRes = await fetch(url, { method: "PUT", headers, body: JSON.stringify(body) }).catch(() => null);
        if (putRes?.ok) return true;
        if (putRes?.status !== 409) {
          if (setStatus) setStatus(`Save failed (${putRes?.status})`, "#f87171");
          return false;
        }
        // 409 = SHA mismatch, re-fetch and retry
      }
      if (setStatus) setStatus("Save failed (conflict)", "#f87171");
      return false;
    }

    // ── delete me row ─────────────────────────────────────────────────────────
    const _saveTimers = {};
    async function deleteRow(date, key) {
      const filename = key + ".json";
      allData[key] = allData[key].filter(r => r.date !== date);
      renderRaw(key);
      if (location.hostname === "localhost") {
        await fetch("/delete-me-row", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ date }) }).catch(() => null);
      } else {
        clearTimeout(_saveTimers[key]);
        _saveTimers[key] = setTimeout(async () => {
          const cfg = await getDecryptedConfig(null);
          if (!cfg) { alert("No credentials available."); return; }
          const ok = await patchGist({ [filename]: { content: JSON.stringify({ data: allData[key] }, null, 2) } }, cfg.gh_pat);
          if (!ok) alert("Failed to save.");
        }, 600);
      }
    }

    // ── Fitbit update ─────────────────────────────────────────────────────────
    async function updateFitbit(btn, statusEl, filename, dataKey, defaultBtnId, defaultStatusId, skipReload = false) {
      btn      = btn      || (defaultBtnId  ? document.getElementById(defaultBtnId)  : null);
      statusEl = statusEl || (defaultStatusId ? document.getElementById(defaultStatusId) : null);
      const setStatus = (msg, color) => { if (!statusEl) return; statusEl.textContent = msg; statusEl.style.color = color || "#94a3b8"; };
      if (btn) btn.disabled = true;

      if (location.hostname === "localhost") {
        setStatus("Updating…");
        const res = await fetch("/update-fitbit", {
          method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({}),
        }).catch(() => null);
        if (!res || !res.ok) {
          const err = res ? (await res.json().catch(() => ({}))).error : "Network error";
          setStatus("Failed: " + (err || res?.status), "#f87171");
          if (btn) btn.disabled = false; return;
        }
        const fileRes = await fetch(`/${filename}?t=` + Date.now()).catch(() => null);
        if (fileRes?.ok) {
          const parsed = await fileRes.json();
          allData[dataKey] = parsed.data || (Array.isArray(parsed) ? parsed : []);
          document.getElementById(`${dataKey}-tbody`).innerHTML = "";
          renderRaw(dataKey);
          setStatus("Done!", "#4ade80");
        } else {
          setStatus("Done — reload to see updates.", "#4ade80");
        }
        if (btn) btn.disabled = false; return;
      }

      // ── production: direct Fitbit API + save to GitHub ───────────────────
      const cfg = await getDecryptedConfig(setStatus);
      if (!cfg) { if (btn) btn.disabled = false; return; }
      const pat   = cfg.gh_pat;
      const creds = dataKey === "me" ? cfg.meCreds : cfg.momCreds;
      if (!creds?.client_id) { setStatus("No Fitbit credentials in config for " + dataKey, "#f87171"); if (btn) btn.disabled = false; return; }
      const fitbitAuth = btoa(`${creds.client_id}:${creds.client_secret}`);

      // 1. Refresh Fitbit token
      setStatus("Refreshing Fitbit token…");
      const tokenRes = await fetch("https://api.fitbit.com/oauth2/token", {
        method: "POST",
        headers: { "Authorization": `Basic ${fitbitAuth}`, "Content-Type": "application/x-www-form-urlencoded" },
        body: `grant_type=refresh_token&refresh_token=${encodeURIComponent(creds.refresh_token)}`,
      }).catch(() => null);
      if (!tokenRes?.ok) { setStatus(`Fitbit token refresh failed (${tokenRes?.status})`, "#f87171"); if (btn) btn.disabled = false; return; }
      const tokens = await tokenRes.json();
      const accessToken = tokens.access_token;
      creds.refresh_token = tokens.refresh_token;

      // 2. Full sync — activity + weight
      const fitbitHdrs = { "Authorization": `Bearer ${accessToken}`, "Accept-Language": "en_US" };
      const fitbitGet = async (url) => { const r = await fetch(url, { headers: fitbitHdrs }).catch(() => null); return r?.ok ? r.json() : {}; };
      const today = todayEST();
      const [_ty, _tm, _td] = today.split("-").map(Number);
      const _yd = new Date(_ty, _tm - 1, _td - 1);
      const yesterday = `${_yd.getFullYear()}-${String(_yd.getMonth()+1).padStart(2,"0")}-${String(_yd.getDate()).padStart(2,"0")}`;
      const records = allData[dataKey];
      const withSteps = records.filter(r => r.steps > 0);
      const lastSteps = withSteps.length ? withSteps.reduce((a, b) => a.date > b.date ? a : b).date : null;
      const _s7 = new Date(_ty, _tm - 1, _td - 7);
      const sevenAgo = `${_s7.getFullYear()}-${String(_s7.getMonth()+1).padStart(2,"0")}-${String(_s7.getDate()).padStart(2,"0")}`;
      const twoBefore = lastSteps ? (() => { const [ly,lm,ld]=lastSteps.split("-").map(Number); const d=new Date(ly,lm-1,ld-2); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; })() : sevenAgo;
      const startDate = twoBefore < sevenAgo ? twoBefore : sevenAgo;
      const byDate = {};
      const store = (d, k, v) => { const n = parseFloat(v); if (!isNaN(n) && (n !== 0 || k === "steps" || k === "floors")) { byDate[d] = byDate[d] || {}; byDate[d][k] = Number.isInteger(n) ? n : Math.round(n * 10) / 10; } };
      const METRICS = [["steps","steps"],["calories","caloriesOut"],["caloriesBMR","caloriesBMR"],["activityCalories","activityCalories"],["floors","floors"],["elevation","elevation"],["minutesSedentary","sedentaryMinutes"],["minutesLightlyActive","lightlyActiveMinutes"],["minutesFairlyActive","fairlyActiveMinutes"],["minutesVeryActive","veryActiveMinutes"]];
      setStatus("Fetching activity…");
      for (const [resource, field] of METRICS) {
        const d = await fitbitGet(`https://api.fitbit.com/1/user/-/activities/${resource}/date/${startDate}/${yesterday}.json`);
        for (const e of d[`activities-${resource}`] || []) store(e.dateTime, field, e.value);
      }
      setStatus("Fetching heart rate…");
      const hrData = await fitbitGet(`https://api.fitbit.com/1/user/-/activities/heart/date/${startDate}/${yesterday}.json`);
      for (const e of hrData["activities-heart"] || []) { const rhr = e.value?.restingHeartRate; if (rhr) store(e.dateTime, "restingHeartRate", rhr); }
      setStatus("Fetching weight…");
      const wtData = await fitbitGet(`https://api.fitbit.com/1/user/-/body/log/weight/date/today/30d.json`);
      for (const e of wtData.weight || []) { const w = Math.round(parseFloat(e.weight) * 10) / 10; if (!byDate[e.date]?.weight || w < byDate[e.date].weight) { byDate[e.date] = byDate[e.date] || {}; byDate[e.date].weight = w; } }
      byDate[today] = byDate[today] || {};  // always create today's entry
      for (const [d, fields] of Object.entries(byDate)) {
        const ex = records.find(r => r.date === d);
        if (ex) { Object.assign(ex, fields); if (!ex.week) ex.week = gymWeekStart(d); }
        else records.push({ date: d, week: gymWeekStart(d), ...fields });
      }
      records.sort((a, b) => a.date < b.date ? -1 : 1);

      // 3. Save updated data + refresh token
      setStatus("Saving…");
      const dataOk = await patchGist({ [filename]: { content: JSON.stringify({ data: allData[dataKey] }, null, 2) } }, pat);
      if (!dataOk) { if (setStatus) setStatus("Save failed", "#f87171"); if (btn) btn.disabled = false; return; }
      await encryptAndSaveConfig(cfg, setStatus);

      // 4. Refresh display
      stepsInitialized = false;
      globalMaxSteps = 0;
      for (const r of allData.me) if (r.steps > globalMaxSteps) globalMaxSteps = r.steps;
      document.getElementById(`${dataKey}-tbody`).innerHTML = "";
      renderRaw(dataKey);
      renderGym();
      renderWeight();
      renderDashboard();
      render();
      setStatus("Done! Reloading…", "#4ade80");
      if (btn) btn.disabled = false;
      if (!skipReload) setTimeout(() => { saveViewForReload(); location.reload(); }, 1200);
      return true;
    }

    async function updateFitbitMe(btn, statusEl) {
      await updateFitbit(btn, statusEl, "me.json", "me", "me-update-btn", "me-update-status");
    }
    async function updateFitbitMom(btn, statusEl) {
      await updateFitbit(btn, statusEl, "mom.json", "mom", "mom-update-btn", "mom-update-status");
    }
    async function updateFitbitBoth(btn, statusEl) {
      if (btn) btn.disabled = true;
      const noBtn = { disabled: false };
      const skipReload = true;
      await updateFitbit(noBtn, statusEl, "me.json",  "me",  null, null, skipReload);
      await updateFitbit(noBtn, statusEl, "mom.json", "mom", null, null, skipReload);
      if (btn) btn.disabled = false;
      const setStatus = (msg, color) => { if (statusEl) { statusEl.textContent = msg; statusEl.style.color = color || "#94a3b8"; } };
      setStatus("Done! Reloading…", "#4ade80");
      setTimeout(() => { saveViewForReload(); location.reload(); }, 1200);
    }

    // ── weight tab ────────────────────────────────────────────────────────────
    async function saveWeightData() {
      const cfg = decryptedConfig || await getDecryptedConfig(null);
      if (cfg && appConfig?.gistId) {
        patchGist({ "weight_data.json": { content: JSON.stringify(weightData, null, 2) } }, cfg.gh_pat).catch(() => null);
      }
    }

    function updateWeight(date, field, value) {
      if (!weightData[date]) weightData[date] = {};
      const trimmed = value.trim();
      if (trimmed === "") {
        delete weightData[date][field];
        if (Object.keys(weightData[date]).length === 0) delete weightData[date];
      } else {
        weightData[date][field] = field === "gym" ? trimmed : parseFloat(trimmed);
      }
      saveWeightData();
    }

    function handleWeightEnter(event, date, field) {
      if (event.key !== "Enter") return;
      event.preventDefault();
      const all = [...document.querySelectorAll(`input[data-field="${field}"]`)];
      const idx = all.findIndex(el => el.dataset.date === date);
      if (idx >= 0 && idx < all.length - 1) {
        all[idx + 1].focus();
        all[idx + 1].select();
      }
    }

    function inp(date, field, cls, mergedData) {
      const w   = mergedData[date];
      const val = w?.[field];
      const v   = val != null ? String(val).replace(/"/g, "&quot;") : "";
      return `<input class="w-input ${cls}" type="text" value="${v}"
        data-date="${date}" data-field="${field}"
        onblur="updateWeight('${date}','${field}',this.value)"
        onkeydown="handleWeightEnter(event,'${date}','${field}')" />`;
    }

    function renderWeight() {
      const meByDate = {};
      const meWeightByDate = {};
      for (const r of allData.me || []) { meByDate[r.date] = r.steps; meWeightByDate[r.date] = r.weight; }

      const mergedData = weightData;

      // All dates: every day from earliest known date up to today (EST), newest first
      const today = todayEST();
      const knownDates = [...Object.keys(mergedData), ...Object.keys(meByDate)];
      const earliest = knownDates.reduce((a,b) => a < b ? a : b);
      const allDates = [];
      const [ty,tm,td] = today.split("-").map(Number);
      for (let d = new Date(ty, tm-1, td); ; d.setDate(d.getDate() - 1)) {
        const iso = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
        allDates.push(iso);
        if (iso <= earliest) break;
      }

      // Summary cards — build weight entries same way as gym page
      const weightDataDatesW = new Set(Object.keys(mergedData));
      const wtEntriesW = [
        ...Object.entries(mergedData)
          .filter(([d]) => d <= today)
          .map(([date, e]) => ({ date, weight: meWeightByDate[date] ?? e.weight ?? null }))
          .filter(e => e.weight != null),
        ...(allData.me || [])
          .filter(r => r.weight != null && !weightDataDatesW.has(r.date) && r.date <= today)
          .map(r => ({ date: r.date, weight: r.weight })),
      ].sort((a, b) => a.date < b.date ? -1 : 1);

      const latestW     = wtEntriesW.length ? wtEntriesW[wtEntriesW.length-1].weight : null;
      const weekStart   = weekStartEST();
      const monthStart  = monthStartEST();

      // Week averages keyed by week-start date (same logic as gym page)
      const weekWtMapW = {};
      for (const e of wtEntriesW) {
        const w = gymWeekStart(e.date);
        (weekWtMapW[w] = weekWtMapW[w] || []).push(e.weight);
      }
      const weekAvgMapW = {};
      for (const [w, ws] of Object.entries(weekWtMapW))
        weekAvgMapW[w] = ws.reduce((s,v)=>s+v,0) / ws.length;
      const sortedWksW = Object.keys(weekAvgMapW).sort();

      const thisWkAvgW = weekAvgMapW[weekStart] ?? null;
      const prevWkIdxW = sortedWksW.indexOf(weekStart) - 1;
      const prevWkAvgW = prevWkIdxW >= 0 ? weekAvgMapW[sortedWksW[prevWkIdxW]] : null;
      const weekDelta  = (thisWkAvgW != null && prevWkAvgW != null) ? thisWkAvgW - prevWkAvgW : null;

      const monthYMW = weekStart.slice(0,7);
      const [mYW, mMW] = monthYMW.split("-").map(Number);
      const prevMonthYMW = `${mMW === 1 ? mYW - 1 : mYW}-${String(mMW === 1 ? 12 : mMW - 1).padStart(2, "0")}`;
      const curMonthWkAvgsW  = sortedWksW.filter(w => w.slice(0,7) === monthYMW).map(w => weekAvgMapW[w]).filter(v => v != null);
      const prevMonthWkAvgsW = sortedWksW.filter(w => w.slice(0,7) === prevMonthYMW).map(w => weekAvgMapW[w]).filter(v => v != null);
      const curMonthAvgW  = curMonthWkAvgsW.length  ? curMonthWkAvgsW.reduce((s,v)=>s+v,0)  / curMonthWkAvgsW.length  : null;
      const prevMonthAvgW = prevMonthWkAvgsW.length ? prevMonthWkAvgsW.reduce((s,v)=>s+v,0) / prevMonthWkAvgsW.length : null;
      const monthDelta = (curMonthAvgW != null && prevMonthAvgW != null) ? curMonthAvgW - prevMonthAvgW : null;

      function fmtDelta(n) {
        if (n == null) return "—";
        return (n > 0 ? "+" : "") + Number(n).toLocaleString(undefined, { maximumFractionDigits: 1, minimumFractionDigits: 1 });
      }
      function deltaClass(n) { return n == null ? "" : n < 0 ? "green" : n > 0 ? "red" : ""; }
      document.getElementById("weight-cards").innerHTML = `
        <div class="card"><div class="card-label">Latest Weight</div><div class="card-value blue">${latestW != null ? fmt(latestW,1) : "—"}</div></div>
        <div class="card"><div class="card-label">Week Δ</div><div class="card-value ${deltaClass(weekDelta)}">${fmtDelta(weekDelta)}</div></div>
        <div class="card"><div class="card-label">Month Δ</div><div class="card-value ${deltaClass(monthDelta)}">${fmtDelta(monthDelta)}</div></div>
      `;

      const weightFrom = document.getElementById("weight-from")?.value || "";
      const weightTo   = document.getElementById("weight-to")?.value   || "";
      const filteredDates = allDates.filter(d => (!weightFrom || d >= weightFrom) && (!weightTo || d <= weightTo));
      document.getElementById("weight-tbody").innerHTML = filteredDates.map(date => {
        const steps = meByDate[date] != null ? fmt(meByDate[date]) : "—";
        const isSunday = new Date(date + "T12:00:00").getDay() === 6;
        const rowStyle = isSunday ? ' style="border-top:2px solid #334155"' : '';
        return `<tr${rowStyle}>
          <td style="text-align:left;color:#94a3b8">${date}</td>
          <td>${inp(date,"fat","w-comp",mergedData)}</td>
          <td>${inp(date,"muscle","w-comp",mergedData)}</td>
          <td>${inp(date,"bone","w-comp",mergedData)}</td>
          <td>${inp(date,"gym","gym-input",mergedData)}</td>
          <td>${inp(date,"weight","w-weight",mergedData)}</td>
          <td style="color:#4ade80;text-align:right">${meWeightByDate[date] != null ? fmt(meWeightByDate[date],1) : ""}</td>
          <td style="color:#94a3b8;text-align:left">${meWeightByDate[date] != null ? fmt(calcBMI(meWeightByDate[date]),1) : ""}</td>
          <td style="color:#94a3b8;text-align:right">${steps}</td>
        </tr>`;
      }).join("");
    }

init();
  </script>
